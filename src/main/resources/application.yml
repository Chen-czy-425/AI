server:
  port: 8088

spring:
  # 数据库连接配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_project?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root  # 你的数据库用户名
    password: 123456 # 你的数据库密码

mybatis:
  # 开启下划线转驼峰
  configuration:
    map-underscore-to-camel-case: true
  # 别名包
  type-aliases-package: com.ai.project.entity

# 日志
logging:
  level:
    com.aiProject: debug
    com.aiProject.mapper: debug
